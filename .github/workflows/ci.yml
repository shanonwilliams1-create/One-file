name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Check formatting
        run: go fmt ./...

      - name: Vet
        run: go vet ./...

      - name: Test (with race detection)
        run: go test -race -count=1 ./...

      - name: Build desktop
        run: make build-desktop

      - name: Build mobile (allow failure)
        run: make build-mobile
        continue-on-error: true

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build all platforms
        run: make build-all

      - name: List build artifacts
        run: ls -lh build/

      - name: Generate checksums
        run: |
          cd build && sha256sum * > checksums.txt && cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
          fail_on_unmatched_files: false